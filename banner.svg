<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 210" width="1200" height="210" role="img" aria-label="Bijan — builder, operator, investor">
  <style>
    .name { font: 600 78px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; letter-spacing: -2.5px; }
    .tag  { font: 400 21px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; letter-spacing: 4px; }
    .meta { font: 400 17px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; letter-spacing: 1px; }
    .ink   { fill: #1f2328; }
    .muted { fill: #59636e; }
